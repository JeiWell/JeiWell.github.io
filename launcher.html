<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快速入口</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171b;
      --border: #2a2a30;
      --accent1: #e8ff4d;
      --accent2: #4dffd4;
      --accent3: #ff6b4d;
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
      gap: 3rem;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--accent1);
    }

    /* Buttons grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 520px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.4rem 1.6rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn:active {
      transform: translateY(0px) scale(0.98);
    }

    /* Individual accent colors */
    .btn-1 { --c: var(--accent1); }
    .btn-2 { --c: var(--accent2); }
    .btn-3 { --c: var(--accent3); }

    .btn::before {
      background: var(--c);
    }

    .btn:hover {
      border-color: var(--c);
      box-shadow: 0 0 28px -4px color-mix(in srgb, var(--c) 40%, transparent);
    }

    .btn:hover::before {
      opacity: 0.04;
    }

    .btn-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--c) 15%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      border: 1px solid color-mix(in srgb, var(--c) 30%, transparent);
    }

    .btn-text {
      flex: 1;
    }

    .btn-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .btn-sub {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .btn-arrow {
      flex-shrink: 0;
      color: var(--c);
      font-size: 1.1rem;
      opacity: 0.7;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover .btn-arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    /* Footer note */
    .footer {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* Responsive: wider layout on larger screens */
    @media (min-width: 640px) {
      .grid {
        gap: 1.2rem;
      }
      .btn {
        padding: 1.6rem 2rem;
      }
    }

    /* Entrance animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header  { animation: fadeUp 0.5s ease both; }
    .btn-1   { animation: fadeUp 0.5s 0.1s ease both; }
    .btn-2   { animation: fadeUp 0.5s 0.18s ease both; }
    .btn-3   { animation: fadeUp 0.5s 0.26s ease both; }
    .footer  { animation: fadeUp 0.5s 0.36s ease both; }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="label">Quick Launch</div>
      <h1>快速<span>入口</span></h1>
    </div>

    <div class="grid">

      <a class="btn btn-1"
         href="https://nick0630.app.n8n.cloud/form/ca31f41c-b7f2-4882-b9d0-a523b763954f"
         target="_blank"
         rel="noopener noreferrer">
        <div class="btn-icon">📋</div>
        <div class="btn-text">
          <div class="btn-title">表單填寫</div>
          <div class="btn-sub">n8n.cloud / form</div>
        </div>
        <div class="btn-arrow">→</div>
      </a>

      <a class="btn btn-2"
         href="https://docs.google.com/spreadsheets/d/11MUtkHAxvU5L_y_7__1-7QsmA9-HhXY2fV5eUh0V1YU/edit?usp=sharing"
         target="_blank"
         rel="noopener noreferrer">
        <div class="btn-icon">📊</div>
        <div class="btn-text">
          <div class="btn-title">Google 試算表</div>
          <div class="btn-sub">docs.google.com / spreadsheets</div>
        </div>
        <div class="btn-arrow">→</div>
      </a>

      <a class="btn btn-3"
         href="https://JeiWell.github.io/off_days_viewer.html"
         target="_blank"
         rel="noopener noreferrer">
        <div class="btn-icon">📅</div>
        <div class="btn-text">
          <div class="btn-title">假日查詢</div>
          <div class="btn-sub">JeiWell.github.io</div>
        </div>
        <div class="btn-arrow">→</div>
      </a>

    </div>

    <div class="footer">點擊後將於新分頁開啟 · 可直接回上一頁</div>

  </div>
</body>
</html>
